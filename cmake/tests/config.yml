# precedence: CLI > YAML > DEFAULTS
platform:
  version: 1.0 # plugin version compatibility will be based on the platform's current 'version'
  # version: 3x.. #test with invalid
db:
  # type: "postgres" # driver loaded will be based on the 'type'
  uri: "postgres://user:pass@localhost:5432/mydb"
  timeout_seconds: 30
  backup_mode: "incremental/full/schema-only"
storage:
  output_path: "/tmp/backups"
  compression: "gzip"
  encryption_key_path: "/home/user/.keys/backup.key"
  remote_target: ""
runtime:
  log_level: 2
  thread_count: 4
  tmp_dir: "/home/user/dirs/document/dbgecko/directory/www/xyz/.open/dirs"
  # TODO: add validation for the values of both the config and the cli args
  # arbitrary: "" #testing with unknown keys
#############################
plugin:
  dir: "/home/toughware/open-source/dbgecko/assets/plugins"
environment:
  user: "hazel"
  password: "demon9"
