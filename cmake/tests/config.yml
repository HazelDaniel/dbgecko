# precedence: CLI > YAML > DEFAULTS
platform:
  version: 1.2 # plugin version and platform version compatibility will be based on the config's version field
db:
  type: "mongodb" #required
  uri: "mongodb://127.0.0.1/testdb" #required
  timeout_seconds: 30 # default 10
  max_retries: 5
  backup_mode: "incremental" # default full
  # backup_mode: "incremental/full/schema-only" # default full
storage:
  output_name: "backups"
  compression: "gzip" #default gzip
  base_dir: "uploads"
  s3:
    region: "us-east1"
    access_key: "toughware"
    secret_key: "xxxxxx"
    use_ssl: false
    endpoint: "http://192.168.69.185:9000"
####### optional
    path_style: "." # TODO: change to force_path_style?<boolean>
    session_token: "."
    max_retries: 3 # TODO: remove this, users don't have to provide
    timeout_seconds: 10
    multipart_threshold_mb: 1000 # TODO: remove this, users don't have to provide
    multipart_chunk_mb: 100 # TODO: remove this, users don't have to provide
  # local:
  #   base_dir: "/tmp/dbgecko/backups"
  # sftp:
  #   private_key: "/home/toughware/.ssh/server/id_ed25519"
  #   port: 22
  #   host: "localhost"
  #   username: "toughware"
  #   password: "hazel999"
  #   max_retries: 3
  #   timeout_seconds: 30
  encryption_key_path: "/home/user/.keys/backup.key" # (required) for secure connection
runtime:
  log_level: 2
  thread_count: 4
  tmp_dir: "/home/user/dirs/document/dbgecko/directory/www/xyz/.open/dirs/"
  # arbitrary: "" #testing with unknown keys
#############################
plugin:
  dir: "/home/toughware/open-source/dbgecko/assets/plugins/"
  path: "libdriver_mongo.1.1.1.so"
environment:
  USER: ""
  HOME: ""
