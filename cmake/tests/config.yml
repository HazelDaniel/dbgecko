# precedence: CLI > YAML > DEFAULTS
platform:
  version: 1.2 # plugin version and platform version compatibility will be based on the config's version field
db:
  type: "mongodb" #required
  uri: "mongodb://127.0.0.1/testdb" #required
  timeout_seconds: 30 # default 10
  max_retries: 5
  backup_mode: "incremental" # default full
  # backup_mode: "incremental/full/schema-only" # default full
  online: true #TODO: infer online status from url if possible - obviates the need for a separate field
storage:
  output_path: "/tmp/dbgecko/backups/backup_mongo" #required
  compression: "gzip" #default gzip
  # s3:
    # endpoint: "https:// | http:// | minio:9000 | .."
    # region: "us-east1"
    # access_key: ""
    # secret_key: ""
    # use_ssl: true
    # path_style: ""
    # session_token: ""
    # max_retries: 3
    # timeout_seconds: 10
    # multipart_threshold_mb: 1000
    # multipart_chunk_mb: 100
  # ssh:
  #   private_key: "/path-to-private-key"
  #   port: 22
  #   host: "ssh_host"
  #   username: ""
  #   max_retries: 3
  #   timeout_seconds: 30
  #   verify_known_hosts: true
  local:
    base_dir: "/tmp/dbgecko/backups"
  # sftp:
  #   private_key: "S30)#k00012k"
  #   port: 22
  #   host: "sftphost"
  #   username: "sftpuser"
  #   max_retries: 3
  #   timeout_seconds: 30
  encryption_key_path: "/home/user/.keys/backup.key" # (required) for secure connection
  remote_target: "ssh:// | file:///tmp" # remote location
runtime:
  log_level: 2
  thread_count: 4
  tmp_dir: "/home/user/dirs/document/dbgecko/directory/www/xyz/.open/dirs/"
  # TODO: add validation for the values of both the config and the cli args
  # arbitrary: "" #testing with unknown keys
#############################
plugin:
  dir: "/home/toughware/open-source/dbgecko/assets/plugins/"
  path: "libdriver_mongo.1.1.1.so"
# only one of the fields below needed
