name: Check Code Quality + Run Unit Tests (dbgecko)

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]

jobs:
  quality-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc valgrind cmake make g++ libyaml-dev libpcre2-dev

      # ---------------------------------------------------------
      # 1. Build with sanitizers (ASan + UBSan)
      # ---------------------------------------------------------
      - name: Build ASan + UBSan binary
        run: |
          mkdir -p build-asan
          gcc \
            -Wall -Wextra -Wpedantic -Wshadow -Wconversion -Wformat=2 \
            -std=c11 \
            -g \
            -fsanitize=address,undefined \
            -fno-omit-frame-pointer \
            src/*.c src/utils/*.c -I include -lyaml -Llib -lslre -lpcre2-8 \
            -o build-asan/dbgecko

      - name: Run ASan + UBSan binary
        run: |
          echo "Running AddressSanitizer + UndefinedBehaviorSanitizer..."
          ./build-asan/dbgecko || exit 1

      # ---------------------------------------------------------
      # 2. Build Valgrind version (NO sanitizers)
      # ---------------------------------------------------------
      - name: Build Valgrind-safe binary
        run: |
          mkdir -p build-valgrind
          gcc \
            -Wall -Wextra -Wpedantic -Wshadow -Wconversion -Wformat=2 \
            -std=c11 \
            -g \
            src/*.c src/utils/*.c -I include -lyaml -Llib -lslre -lpcre2-8 \
            -o build-valgrind/dbgecko -lm

      - name: Run Valgrind memory scan
        run: |
          echo "Running Valgrind deep scan..."
          valgrind \
            --leak-check=full \
            --show-leak-kinds=all \
            --track-origins=yes \
            --errors-for-leak-kinds=all \
            --error-exitcode=1 \
            ./build-valgrind/dbgecko

      # ---------------------------------------------------------
      # 3. Run unit tests via CMake/CTest
      # ---------------------------------------------------------
      - name: Build and run unit tests
        run: |
          rm -rf build
          mkdir build
          cd build
          cmake ..
          cmake --build .
          ctest -V
